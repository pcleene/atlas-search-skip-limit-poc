<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroTrade Parts Search - POC</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-text">AEROTRADE</span>
                    <span class="version-badge">3.0</span>
                </div>
                <nav class="nav">
                    <a href="#" class="nav-link active">Parts Listing</a>
                    <a href="#" class="nav-link">My Orders</a>
                    <a href="#" class="nav-link">Customer Orders</a>
                </nav>
                <div class="header-actions">
                    <button class="icon-btn">
                        <span class="icon">❤</span>
                    </button>
                    <button class="icon-btn">
                        <span class="icon">🛒</span>
                        <span class="badge">0</span>
                    </button>
                    <div class="user-avatar">
                        <span>MJK</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Search Section -->
    <section class="search-section">
        <div class="container">
            <div class="search-wrapper">
                <div class="search-input-wrapper">
                    <input
                        type="text"
                        id="searchInput"
                        class="search-input"
                        placeholder="Search by part number, name, or serial number..."
                        autocomplete="off"
                    >
                    <button class="search-clear" id="clearSearch" style="display: none;">×</button>
                    <!-- Autocomplete suggestions -->
                    <div id="autocompleteResults" class="autocomplete-results" style="display: none;"></div>
                </div>
                <button class="bulk-search-btn">
                    <span class="icon">≡</span> Bulk Search
                </button>
            </div>
        </div>
    </section>

    <!-- Breadcrumb -->
    <div class="container">
        <div class="breadcrumb">
            <a href="#">AEROTRADE</a>
            <span class="separator">/</span>
            <span class="current">Parts Listing</span>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Controls Bar -->
            <div class="controls-bar">
                <div class="controls-left">
                    <div class="control-group">
                        <label>Sort By</label>
                        <select id="sortBy" class="select-input">
                            <option value="relevance">Relevance (Search Score)</option>
                            <option value="price-asc">Lowest Price</option>
                            <option value="price-desc">Highest Price</option>
                            <option value="updated-desc">Recently Updated</option>
                            <option value="name-asc">Part Number (A-Z)</option>
                        </select>
                    </div>
                </div>
                <div class="controls-right">
                    <div class="control-group">
                        <label>Rows per page:</label>
                        <select id="rowsPerPage" class="select-input">
                            <option value="20" selected>20</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                        </select>
                    </div>
                    <button class="filter-btn" id="filterBtn">
                        <span class="icon">⚙</span> Filter
                    </button>
                </div>
            </div>

            <!-- Filter Panel (Initially Hidden) -->
            <div id="filterPanel" class="filter-panel" style="display: none;">
                <div class="filter-header">
                    <h3>Filters</h3>
                    <button class="close-btn" id="closeFilters">×</button>
                </div>
                <div class="filter-content">
                    <!-- Condition Filter -->
                    <div class="filter-section">
                        <h4>Condition</h4>
                        <div class="filter-options" id="conditionFilters">
                            <!-- Dynamically populated -->
                        </div>
                    </div>
                    <!-- Location Filter -->
                    <div class="filter-section">
                        <h4>Location</h4>
                        <div class="filter-options" id="locationFilters">
                            <!-- Dynamically populated -->
                        </div>
                    </div>
                    <!-- Seller Filter -->
                    <div class="filter-section">
                        <h4>Seller</h4>
                        <div class="filter-options" id="sellerFilters">
                            <!-- Dynamically populated -->
                        </div>
                    </div>
                </div>
                <div class="filter-actions">
                    <button class="btn btn-secondary" id="clearFilters">Clear All</button>
                    <button class="btn btn-primary" id="applyFilters">Apply Filters</button>
                </div>
            </div>

            <!-- Results Header with Page Info -->
            <div id="resultsHeader" class="results-header" style="display: none;">
                <span class="page-info" id="pageInfoTop">Showing 1-20</span>
            </div>

            <!-- Loading State -->
            <div id="loadingState" class="loading-state" style="display: none;">
                <div class="spinner"></div>
                <p>Loading parts...</p>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state" style="display: none;">
                <p>No parts found matching your search criteria.</p>
            </div>

            <!-- Parts Listing -->
            <div class="parts-listing" id="partsListing">
                <!-- Parts will be dynamically inserted here -->
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination" style="display: none;">
                <button class="btn btn-secondary" id="prevPage" disabled>Previous</button>
                <span class="page-info" id="pageInfo">Showing 1-20 of 100</span>
                <button class="btn btn-secondary" id="nextPage">Next</button>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
